project:
  name: assignment3_seq_instruction_tuning
  seed: 42

models:
  student_model: microsoft/Phi-3.5-mini-instruct
  teacher_model: meta-llama/Meta-Llama-3.1-70B-Instruct
  judge_model: meta-llama/Meta-Llama-3.1-70B-Instruct

training:
  max_seq_length: 1024
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

  stage1:
    learning_rate: 2e-5
    epochs: 2
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8

  stage2:
    learning_rate: 1e-5
    epochs: 2
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8

evaluation:
  alpaca_eval_min_prompts: 100
  json_eval_min_prompts: 100
  judge_temperature: 0.0
  max_new_tokens: 512
  randomize_order: true
